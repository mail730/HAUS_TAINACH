<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Haus Tainach Viewer</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(180deg, #dbe7f3 0%, #eef3f8 42%, #d8e0e8 100%);
    }
    #app { position: relative; width: 100%; height: 100%; }
    canvas { display: block; }
    .panel {
      position: absolute; top: 18px; left: 18px; z-index: 10; width: 340px; max-width: calc(100vw - 36px);
      background: rgba(255,255,255,0.82); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.7); border-radius: 20px; box-shadow: 0 18px 48px rgba(15,23,42,0.18); padding: 18px;
    }
    .helpbox {
      position: absolute; left: 18px; bottom: 18px; z-index: 10; width: 260px; max-width: calc(100vw - 36px);
      background: rgba(15,23,42,0.74); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      color: #e2e8f0; border: 1px solid rgba(255,255,255,0.12); border-radius: 18px; box-shadow: 0 14px 40px rgba(15,23,42,0.22); padding: 14px 16px;
    }
    .helpbox h2 { margin: 0 0 10px; font-size: 13px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: #cbd5e1; }
    .helpbox .row { display: grid; grid-template-columns: 72px 1fr; gap: 10px; font-size: 12px; line-height: 1.4; margin-bottom: 7px; }
    .helpbox .key { color: #93c5fd; font-weight: 700; }
    .panel h1 { margin: 0; font-size: 18px; font-weight: 700; color: #0f172a; }
    .panel-subtitle { margin-top: 4px; font-size: 12px; color: #64748b; }
    .group { margin-top: 16px; padding-top: 14px; border-top: 1px solid rgba(148,163,184,0.2); }
    .group-title { font-size: 11px; font-weight: 700; color: #475569; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.08em; }
    .buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    button, .button-like {
      border: 0; border-radius: 14px; padding: 12px 14px; cursor: pointer;
      background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); color: white; font-size: 14px; font-weight: 600;
      box-shadow: 0 8px 18px rgba(15,23,42,0.16); transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    button:hover, .button-like:hover { transform: translateY(-1px); box-shadow: 0 10px 22px rgba(15,23,42,0.2); }
    button.secondary, .button-like.secondary { background: linear-gradient(180deg, #94a3b8 0%, #64748b 100%); }
    button.active { background: linear-gradient(180deg, #0f766e 0%, #115e59 100%); }
    .file-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    #fileInput { display: none; }
    label { display: block; font-size: 13px; margin-bottom: 8px; color: #334155; font-weight: 500; }
    input[type="range"] { width: 100%; accent-color: #2563eb; }
    .legend { display: grid; gap: 10px; }
    .legend-item { display: grid; grid-template-columns: 14px 1fr; gap: 10px; align-items: center; font-size: 13px; color: #334155; }
    .dot { width: 14px; height: 14px; border-radius: 999px; box-shadow: inset 0 0 0 1px rgba(15,23,42,0.12), 0 2px 6px rgba(15,23,42,0.08); }
    .dot.privat { background: #c48047; }
    .dot.gewerbe { background: #567860; }
    .dot.vermietet { background: #597ea3; }
    .status { margin-top: 12px; font-size: 12px; color: #64748b; line-height: 1.4; min-height: 18px; }
    #demoCursor {
      position: absolute; z-index: 20; width: 44px; height: 44px; pointer-events: none; opacity: 0; transform: translate(-50%, -50%) scaleX(-1) scale(1);
      transition: transform 0.18s ease, opacity 0.25s ease, left 0.35s ease, top 0.35s ease;
    }
    #demoCursor::before {
      content: ''; position: absolute; left: 0; top: 0; width: 0; height: 0;
      border-left: 0 solid transparent; border-right: 20px solid transparent; border-top: 36px solid #ff5a36;
      transform: rotate(-35deg); transform-origin: 0 0;
      filter: drop-shadow(0 3px 8px rgba(255,90,54,0.45));
    }
