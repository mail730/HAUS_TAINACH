<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Haus Tainach Viewer</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #e9ecef;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }

    .panel {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      width: 280px;
      max-width: calc(100vw - 32px);
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      padding: 14px;
    }

    .panel h1 {
      margin: 0 0 10px;
      font-size: 16px;
    }

    .group {
      margin-top: 12px;
    }

    .group-title {
      font-size: 12px;
      font-weight: bold;
      color: #444;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 12px;
      cursor: pointer;
      background: #1f2937;
      color: white;
      font-size: 14px;
    }

    button.secondary {
      background: #6b7280;
    }

    button.off {
      background: #c7cdd4;
      color: #222;
    }

    button.active {
      background: #0f766e;
    }

    label {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
      color: #333;
    }

    input[type="range"] {
      width: 100%;
    }

    .status {
      margin-top: 10px;
      font-size: 12px;
      color: #555;
      line-height: 1.4;
    }

    @media (max-width: 700px) {
      .panel {
        width: calc(100vw - 24px);
        left: 12px;
        top: 12px;
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="panel">
      <h1>Haus Tainach Viewer</h1>

      <div class="group">
        <div class="group-title">Modellzustand</div>
        <div class="buttons">
          <button id="stateBestand" class="active">Bestand</button>
          <button id="stateUmbau">Umbau</button>
        </div>
      </div>

      <div class="group">
        <div class="group-title">Glas</div>
        <div class="buttons">
          <button id="toggleGlass">Glas an/aus</button>
        </div>
      </div>

      <div class="group">
        <div class="group-title">Schnitt</div>
        <label for="clipSlider">Höhe</label>
        <input id="clipSlider" type="range" min="-5" max="15" step="0.1" value="15" />
      </div>

      <div class="group">
        <div class="group-title">Ansicht</div>
        <div class="buttons">
          <button id="resetView">Reset</button>
          <button id="showAll" class="secondary">Alles an</button>
        </div>
      </div>

      <div class="status" id="status">Lade Modell ...</div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const app = document.getElementById('app');
    const statusEl = document.getElementById('status');
    const clipSlider = document.getElementById('clipSlider');
    const resetViewBtn = document.getElementById('resetView');
    const showAllBtn = document.getElementById('showAll');
    const stateBestandBtn = document.getElementById('stateBestand');
    const stateUmbauBtn = document.getElementById('stateUmbau');
    const toggleGlassBtn = document.getElementById('toggleGlass');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xe9ecef);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.set(18, 12, 18);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.localClippingEnabled = true;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 4, 0);
    controls.minDistance = 5;
    controls.maxDistance = 80;
    controls.maxPolarAngle = Math.PI / 2;

    const ambient = new THREE.AmbientLight(0xffffff, 1.8);
    scene.add(ambient);

    const dir1 = new THREE.DirectionalLight(0xffffff, 1.8);
    dir1.position.set(15, 25, 10);
    scene.add(dir1);

    const dir2 = new THREE.DirectionalLight(0xffffff, 0.8);
    dir2.position.set(-10, 12, -8);
    scene.add(dir2);

    const clippingPlane = new THREE.Plane(new THREE.Vector3(0, -1, 0), 15);
    const groupMap = new Map();

    const groups = {
      bestandOnly: ['DACH', 'GASTGARTEN', 'GASTGARTENDACH', 'GASTGARTENGLAS'],
      umbauOnly: ['DACHUMBAU'],
      alwaysOn: [
        'AUSENWAENDE',
        'AUSENWAENDE_FARBE',
        'DEKEUG',
        'DECKEOG',
        'BALKONE',
        'FENSTERRAHMEN',
        'INNENWAENDEUG',
        'INNENWAENDEOG',
        'ZUBAU',
        'GRUNDSTÜCK',
        'TREPPEN',
        'TREPPENOG',
        'STÜTZMAUER'
      ],
      glass: ['FENSTERGLAS', 'GASTGARTENGLAS', 'ZUBAUGLAS']
    };

    let currentState = 'bestand';
    let glassVisible = true;

    function findByNames(model, names) {
      const found = [];
      model.traverse((child) => {
        if (!child.name) return;
        const cleanName = child.name.toUpperCase();
        if (names.some((name) => cleanName.includes(name.toUpperCase()))) {
          found.push(child);
        }
      });
      return found;
    }

    function applyClipping(object) {
      object.traverse((child) => {
        if (!child.isMesh) return;

        if (Array.isArray(child.material)) {
          child.material.forEach((mat) => {
            mat.clippingPlanes = [clippingPlane];
            mat.clipShadows = true;
            mat.needsUpdate = true;
          });
        } else if (child.material) {
          child.material.clippingPlanes = [clippingPlane];
          child.material.clipShadows = true;
          child.material.needsUpdate = true;
        }
      });
    }

    function collectGroups(model) {
      groupMap.set('bestandOnly', findByNames(model, groups.bestandOnly));
      groupMap.set('umbauOnly', findByNames(model, groups.umbauOnly));
      groupMap.set('alwaysOn', findByNames(model, groups.alwaysOn));
      groupMap.set('glass', findByNames(model, groups.glass));
    }

    function setVisible(listName, visible) {
      const items = groupMap.get(listName) || [];
      items.forEach((obj) => { obj.visible = visible; });
    }

    function applyState(state) {
      currentState = state;

      setVisible('alwaysOn', true);
      setVisible('glass', glassVisible);

      if (state === 'bestand') {
        setVisible('bestandOnly', true);
        setVisible('umbauOnly', false);
        stateBestandBtn.classList.add('active');
        stateUmbauBtn.classList.remove('active');
        statusEl.textContent = 'Modellzustand: Bestand';
      } else {
        setVisible('bestandOnly', false);
        setVisible('umbauOnly', true);
        stateBestandBtn.classList.remove('active');
        stateUmbauBtn.classList.add('active');
        statusEl.textContent = 'Modellzustand: Umbau';
      }
    }

    function applyGlass() {
      setVisible('glass', glassVisible);
      toggleGlassBtn.classList.toggle('off', !glassVisible);
    }

    stateBestandBtn.addEventListener('click', () => applyState('bestand'));
    stateUmbauBtn.addEventListener('click', () => applyState('umbau'));

    toggleGlassBtn.addEventListener('click', () => {
      glassVisible = !glassVisible;
      applyGlass();
      statusEl.textContent = glassVisible ? 'Glas eingeblendet.' : 'Glas ausgeblendet.';
    });

    clipSlider.addEventListener('input', (e) => {
      clippingPlane.constant = Number(e.target.value);
      statusEl.textContent = `Schnitthöhe: ${Number(e.target.value).toFixed(1)}`;
    });

    resetViewBtn.addEventListener('click', () => {
      camera.position.set(18, 12, 18);
      controls.target.set(0, 4, 0);
      controls.update();
      clippingPlane.constant = 15;
      clipSlider.value = 15;
      statusEl.textContent = 'Ansicht zurückgesetzt.';
    });

    showAllBtn.addEventListener('click', () => {
      glassVisible = true;
      applyGlass();
      applyState(currentState);
      statusEl.textContent = 'Aktueller Zustand vollständig eingeblendet.';
    });

    const loader = new GLTFLoader();
    loader.load(
      './Haus_Tainach_BANK.glb',
      (gltf) => {
        const rootModel = gltf.scene;
        scene.add(rootModel);

        const box = new THREE.Box3().setFromObject(rootModel);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());

        rootModel.position.sub(center);
        rootModel.position.y += size.y / 2;

        controls.target.set(0, size.y * 0.35, 0);
        camera.position.set(size.x * 1.4, size.y * 1.1, size.z * 1.4);
        controls.update();

        applyClipping(rootModel);
        collectGroups(rootModel);
        applyGlass();
        applyState('bestand');
      },
      undefined,
      (error) => {
        console.error(error);
        statusEl.textContent = 'Fehler beim Laden der GLB-Datei.';
      }
    );

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
